<!doctype html><html lang=pt-BR><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Precificação</title><style>body{font-family:Arial;background:#080812;color:white;margin:0}main{max-width:760px;margin:auto;padding:24px}.box{background:#151528;border:1px solid #333;border-radius:20px;padding:18px;margin:14px 0}a{color:white}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}input,select,button{width:100%;padding:13px;border-radius:12px;border:1px solid #333;background:#20203a;color:white;font-weight:700}button{background:linear-gradient(135deg,#ff6422,#ff3d45);border:0;margin-top:12px}.r{display:flex;justify-content:space-between;border-top:1px solid #333;padding:12px 0}.price{font-size:22px;font-weight:900;color:#ffb63e}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style><main><a href=../>← Voltar</a><h1>Precificação automática</h1><p>Calcule preço de lanches e produtos sem IA.</p><div class=box><div class=grid><label>Item<input id=nome value="Combo especial"></label><label>Ingredientes/produto<input id=ing type=number value=7 step=.01></label><label>Embalagem<input id=emb type=number value=2 step=.01></label><label>Mão de obra<input id=mao type=number value=1.5 step=.01></label><label>Perdas/extras<input id=per type=number value=.5 step=.01></label><label>Taxa app %<input id=tax type=number value=12 step=.1></label><label>Entrega subsidiada<input id=ent type=number value=0 step=.01></label><label>Margem ideal %<input id=mar type=number value=120></label></div><button onclick=calc()>Calcular preço ideal</button></div><div class=box><div class=r><b>Custo total</b><span id=custo></span></div><div class=r><b>Econômico</b><span id=eco class=price></span></div><div class=r><b>Ideal recomendado</b><span id=ideal class=price></span></div><div class=r><b>Premium</b><span id=prem class=price></span></div><div class=r><b>Venda direta</b><span id=dir class=price></span></div><button onclick=copiar()>Copiar resumo</button></div></main><script>function n(i){return parseFloat(document.getElementById(i).value)||0}function br(v){return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}function ar(v){return Math.floor(v)+.9+(v>Math.floor(v)+.9?1:0)}function px(c,m,t){let f=1-t/100;return f<=0?0:(c+c*m/100)/f}function calc(){let c=n('ing')+n('emb')+n('mao')+n('per')+n('ent'),t=n('tax'),m=n('mar');custo.textContent=br(c);eco.textContent=br(ar(px(c,Math.max(20,m*.55),t)));ideal.textContent=br(ar(px(c,m,t)));prem.textContent=br(ar(px(c,m*1.55,t)));dir.textContent=br(ar(c+c*m/100))}function copiar(){navigator.clipboard.writeText('Precificação '+nome.value+'\nIdeal: '+ideal.textContent+'\nEconômico: '+eco.textContent+'\nPremium: '+prem.textContent+'\nDireta: '+dir.textContent)}calc()</script></html>
