<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Arte #116 - Acai</title><link rel="stylesheet" href="../style-art.css"></head><body><div class="topbar"><a class="btn-back" href="../">&#8592; Voltar</a><div class="badge">ARTE FÁCIL PRO DELIVERY</div></div><div class="content"><h1>Arte #116 - Acaí</h1><p class="sub">Preencha os dados e gere o prompt.</p><img class="arte" src="preview.jpg" alt="Arte 116"><button class="btn-download" onclick="baixarImagem()">Baixar referência</button><label>Nome da marca</label><input id="marca"><label>WhatsApp</label><input id="whats"><label>Preço</label><input id="preco"><button class="btn-gerar" onclick="gerar()">GERAR PROMPT</button><textarea class="prompt-area" id="prompt-output"></textarea></div><script>function baixarImagem(){let a=document.createElement('a');a.href='preview.jpg';a.click()}function gerar(){let m=document.getElementById('marca').value;let p=document.getElementById('preco').value;let w=document.getElementById('whats').value;document.getElementById('prompt-output').value='Use a imagem de referencia como base principal. Crie uma arte profissional para açaí com marca '+m+', preço '+p+' e WhatsApp '+w+'.';}</script></body></html>
