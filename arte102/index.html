<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arte Fácil Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: #fff;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #1a1a1a;
    border-radius: 10px;
    overflow: hidden;
    text-decoration: none;
    color: white;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 100%;
    display: block;
}

.card-title {
    padding: 10px;
    font-size: 14px;
    text-align: center;
}
</style>

</head>
<body>

<div class="container">
    <h1>Arte Fácil Pro</h1>

    <div class="grid">

        <a class="card" href="arte098/">
            <img src="arte098/preview.jpg">
            <div class="card-title">Arte 098</div>
        </a>

        <a class="card" href="arte099/">
            <img src="arte099/preview.jpg">
            <div class="card-title">Arte 099</div>
        </a>

        <a class="card" href="arte100/">
            <img src="arte100/preview.jpg">
            <div class="card-title">Arte 100</div>
        </a>

        <a class="card" href="arte101/">
            <img src="arte101/preview.jpg">
            <div class="card-title">Arte 101</div>
        </a>

        <a class="card" href="arte102/">
            <img src="arte102/preview.jpg">
            <div class="card-title">Arte 102</div>
        </a>

    </div>
</div>

</body>
</html>
